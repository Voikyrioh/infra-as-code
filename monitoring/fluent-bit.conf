[SERVICE]
    Flush           5
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf

[INPUT]
    Name            tail
    Path            /var/lib/docker/containers/*/*.log
    Tag             docker.*
    Parser          docker
    DB              /var/fluent-bit/pos.db
    Mem_Buf_Limit   50MB
    Skip_Long_Lines On
    Refresh_Interval 10

[FILTER]
    Name            record_modifier
    Match           docker.*
    Record          hostname ${HOSTNAME}

[OUTPUT]
    Name            loki
    Match           *
    Host            loki
    Port            3100
    Labels          job=docker
    Line_Format     json
