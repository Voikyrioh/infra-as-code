name: Deploy Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy dashboard source to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "dashboard/"
          target: /opt/infra/

      - name: Create .env on VPS (first deploy only)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            if [ ! -f /opt/infra/dashboard/.env ]; then
              cat > /opt/infra/dashboard/.env <<EOF
            GITHUB_TOKEN=${{ secrets.DASHBOARD_GITHUB_TOKEN }}
            RP_ID=voikyrioh.fr
            ORIGIN=https://dashboard.voikyrioh.fr
            EOF
            fi

      - name: Build and deploy dashboard
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /opt/infra/dashboard
            docker compose build
            docker compose up -d
            docker compose ps
