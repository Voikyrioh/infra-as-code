name: Migrate & Seed — dofus-db-api

on:
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Exécuter le seed des données initiales (idempotent — ignoré si données déjà présentes)"
        required: false
        type: boolean
        default: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Vault CLI
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gpg
          wget -qO- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y -qq vault

      - name: Authentification Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
        run: |
          TOKEN=$(vault write -field=token auth/approle/login \
            role_id="$VAULT_ROLE_ID" \
            secret_id="$VAULT_SECRET_ID")
          echo "VAULT_TOKEN=$TOKEN"     >> $GITHUB_ENV
          echo "VAULT_ADDR=$VAULT_ADDR" >> $GITHUB_ENV

      - name: Récupération des credentials MySQL depuis Vault
        run: |
          MYSQL_HOST=$(vault kv get -field=MYSQL_HOST secret/apps/dofus-db-api)
          MYSQL_PORT=$(vault kv get -field=MYSQL_PORT secret/apps/dofus-db-api)
          MYSQL_DATABASE=$(vault kv get -field=MYSQL_DATABASE secret/apps/dofus-db-api)
          MYSQL_USER=$(vault kv get -field=MYSQL_USER secret/apps/dofus-db-api)
          MYSQL_PASSWORD=$(vault kv get -field=MYSQL_PASSWORD secret/apps/dofus-db-api)

          echo "::add-mask::$MYSQL_PASSWORD"

          echo "MYSQL_HOST=$MYSQL_HOST"         >> $GITHUB_ENV
          echo "MYSQL_PORT=$MYSQL_PORT"         >> $GITHUB_ENV
          echo "MYSQL_DATABASE=$MYSQL_DATABASE" >> $GITHUB_ENV
          echo "MYSQL_USER=$MYSQL_USER"         >> $GITHUB_ENV
          echo "MYSQL_PASSWORD=$MYSQL_PASSWORD" >> $GITHUB_ENV

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$VPS_SSH_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Migrations
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          ssh -p "$VPS_SSH_PORT" "deploy@$VPS_HOST" \
            "docker run --rm \
              --network mysql \
              -e NODE_ENV=production \
              -e MYSQL_HOST='$MYSQL_HOST' \
              -e MYSQL_PORT='$MYSQL_PORT' \
              -e MYSQL_USER='$MYSQL_USER' \
              -e MYSQL_PASSWORD='$MYSQL_PASSWORD' \
              -e MYSQL_DATABASE='$MYSQL_DATABASE' \
              ghcr.io/voikyrioh/dofus-db-api:latest \
              node node_modules/.bin/db-migrate up --config database.json -e production"

      - name: Seed des données initiales
        if: ${{ inputs.run_seed == true }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          ssh -p "$VPS_SSH_PORT" "deploy@$VPS_HOST" \
            "docker run --rm \
              --network mysql \
              -e NODE_ENV=production \
              -e MYSQL_HOST='$MYSQL_HOST' \
              -e MYSQL_PORT='$MYSQL_PORT' \
              -e MYSQL_USER='$MYSQL_USER' \
              -e MYSQL_PASSWORD='$MYSQL_PASSWORD' \
              -e MYSQL_DATABASE='$MYSQL_DATABASE' \
              ghcr.io/voikyrioh/dofus-db-api:latest \
              npm run seed"

      - name: Cleanup SSH
        if: always()
        run: rm -rf ~/.ssh
