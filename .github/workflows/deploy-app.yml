name: Deploy App (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Nom de l'app (= nom du dossier dans /opt/infra/apps/)"
        required: true
        type: string
      image_name:
        description: "Nom de l'image Docker sur GHCR"
        required: true
        type: string
    secrets:
      VPS_HOST:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_SSH_PORT:
        required: true
      VAULT_ADDR:
        required: true
      VAULT_ROLE_ID:
        required: true
      VAULT_SECRET_ID:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Install Vault CLI
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gpg
          wget -qO- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq && sudo apt-get install -y -qq vault

      - name: Générer .env depuis Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_ROLE_ID: ${{ secrets.VAULT_ROLE_ID }}
          VAULT_SECRET_ID: ${{ secrets.VAULT_SECRET_ID }}
          APP_NAME: ${{ inputs.app_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          TOKEN=$(vault write -field=token auth/approle/login \
            role_id="$VAULT_ROLE_ID" \
            secret_id="$VAULT_SECRET_ID")
          export VAULT_TOKEN="$TOKEN"

          echo "IMAGE_TAG=${IMAGE_TAG:0:7}" > .env

          if vault kv get -format=json "secret/apps/$APP_NAME" > /tmp/vault-secrets.json 2>/dev/null; then
            jq -r '.data.data | to_entries[] | "\(.key)=\(.value)"' /tmp/vault-secrets.json >> .env
          fi

          echo "=== .env généré (clés uniquement) ==="
          cut -d= -f1 .env

      - name: Copy .env to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: ".env"
          target: /opt/infra/apps/${{ inputs.app_name }}/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /opt/infra/apps/${{ inputs.app_name }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
