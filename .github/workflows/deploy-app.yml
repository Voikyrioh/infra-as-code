name: Deploy App (Reusable)

on:
  workflow_call:
    inputs:
      app_name:
        description: "Nom de l'app (= nom du dossier dans /opt/infra/apps/)"
        required: true
        type: string
      image_name:
        description: "Nom de l'image Docker sur GHCR"
        required: true
        type: string
    secrets:
      VPS_HOST:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_SSH_PORT:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image_name }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "docker-compose.yml"
          target: /opt/infra/apps/${{ inputs.app_name }}/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            cd /opt/infra/apps/${{ inputs.app_name }}
            echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" > .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose ps
