---
- name: Provision PostgreSQL database for an app
  hosts: all
  become: true
  become_user: postgres

  vars:
    db_name: "{{ db_name }}"
    db_user: "{{ db_user }}"
    db_password: "{{ db_password }}"

  tasks:
    - name: Create database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        state: present

    - name: Create user
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present

    - name: Grant all privileges on database
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        privs: ALL
        type: database
        state: present
