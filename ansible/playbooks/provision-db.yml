---
- name: Provision PostgreSQL database for an app
  hosts: all
  # Uses docker exec — no psycopg2 required on the target host

  vars:
    db_name: "{{ db_name }}"
    db_user: "{{ db_user }}"
    db_password: "{{ db_password }}"
    container: "{{ postgres_container | default('shared_postgres') }}"

  tasks:
    - name: Create database (idempotent)
      shell: |
        docker exec {{ container }} psql -U postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname = '{{ db_name }}'" \
          | grep -q 1 || \
          docker exec {{ container }} psql -U postgres -c \
          "CREATE DATABASE {{ db_name }};"

    - name: Create user (idempotent)
      shell: |
        docker exec {{ container }} psql -U postgres -tc \
          "SELECT 1 FROM pg_roles WHERE rolname = '{{ db_user }}'" \
          | grep -q 1 || \
          docker exec {{ container }} psql -U postgres -c \
          "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';"

    - name: Grant privileges on database
      shell: |
        docker exec {{ container }} psql -U postgres -c \
          "GRANT ALL PRIVILEGES ON DATABASE {{ db_name }} TO {{ db_user }};"

    - name: Grant privileges on public schema
      shell: |
        docker exec {{ container }} psql -U postgres -d {{ db_name }} -c \
          "GRANT ALL ON SCHEMA public TO {{ db_user }};"

    - name: Set default privileges on future tables
      shell: |
        docker exec {{ container }} psql -U postgres -d {{ db_name }} -c \
          "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO {{ db_user }};"
