---
- name: Provision PostgreSQL database for an app
  hosts: all
  become: true
  become_user: postgres

  tasks:
    - name: Create database
      community.postgresql.postgresql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/postgresql

    - name: Create user
      community.postgresql.postgresql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        state: present
        login_unix_socket: /var/run/postgresql

    - name: Grant all privileges on database
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        privs: ALL
        type: database
        state: present
        login_unix_socket: /var/run/postgresql

    - name: Grant privileges on public schema
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        privs: ALL
        type: schema
        objs: public
        state: present
        login_unix_socket: /var/run/postgresql

    - name: Grant default privileges on future tables
      community.postgresql.postgresql_privs:
        database: "{{ db_name }}"
        roles: "{{ db_user }}"
        privs: ALL
        type: default_privs
        objs: TABLES
        state: present
        login_unix_socket: /var/run/postgresql
